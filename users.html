<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="sidebar-container"></div>

<div class="layout">


<div class="main">

<header>
<button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebar">☰</button>
<h2>Users Management</h2>
<div class="header-icons">
           
    </div>
</header>

<h3>Add User</h3>
<div class="card shadow-sm mb-4">

<div class="card-header bg-primary text-white">
Add User
</div>

<div class="card-body">

<form id="userForm" class="row g-3">

<div class="col-md-4">
<input type="text" id="userName" class="form-control" placeholder="User Name">
</div>

<div class="col-md-4">
<input type="email" id="userEmail" class="form-control" placeholder="Email">
</div>

<div class="col-md-3">
<select id="userStatus" class="form-select">
<option value="">Status</option>
<option>Active</option>
<option>Inactive</option>
</select>
</div>

<div class="col-md-1">
<button class="btn btn-success w-100">Add</button>
</div>

</form>

</div>

</div>


<h3 class="mt-4">Users List</h3>

<table class="table table-hover table-striped">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersBody"></tbody>

</table>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/loadSidebar.js"></script>
<script src="js/users.js"></script>

</body>
</html>
