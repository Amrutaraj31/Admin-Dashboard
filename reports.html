<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

<div id="sidebar-container"></div>

<div class="main">

<header>
<button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebar">☰</button>
<h2>Reports Dashboard</h2>
 <div class="header-icons">
           
    </div>
</header>

<div id="reportContent">

<h3 class="mt-3">Analytics Overview</h3>

<div class="row">


<div class="row g-4">

<div class="col-md-6">
<div class="card chart-card">
<div class="card-header">Orders Overview</div>
<div class="card-body">
<div class="chart-container">
<canvas id="ordersChart"></canvas>
</div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card chart-card">
<div class="card-header">Users Status</div>
<div class="card-body">
<div class="chart-container">
<canvas id="usersChart"></canvas>
</div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card chart-card">
<div class="card-header">Monthly Revenue</div>
<div class="card-body">
<div class="chart-container">
<canvas id="revenueChart"></canvas>
</div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card chart-card">
<div class="card-header">Orders By Category</div>
<div class="card-body">
<div class="chart-container">
<canvas id="categoryChart"></canvas>
</div>
</div>
</div>
</div>

</div>
</div>


<button class="btn btn-primary mt-4" onclick="downloadReport()">
Download Full Report (PDF)
</button>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/loadSidebar.js"></script>
<script src="js/reports.js"></script>

</body>
</html>
