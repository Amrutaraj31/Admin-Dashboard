       <link rel="stylesheet" href="css/styles.css">

</head>
<body>
<div class="layout">
<div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">

  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Admin Panel</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">

    <ul class="list-group">
      <li class="list-group-item">
        <a href="dashboard.html">Dashboard</a>
      </li>

      <li class="list-group-item">
        <a href="#">Users</a>
      </li>

      <li class="list-group-item">
        <a href="roles.html">Roles & Permissions</a>
      </li>

      <li class="list-group-item">
        <a href="#">Reports</a>
      </li>

      <li class="list-group-item">
        <a href="#">Settings</a>
      </li>

      <li class="list-group-item">
        <a href="index.html">Logout</a>
      </li>
    </ul>

  </div>

</div>

     <div class="main">
        <header>
<button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebar">☰</button>   
            <h2>Roles & Permissions</h2>
             <div class="header-icons">
               
    </div>
</header>
        <h3>  Roles</h3>
    <table id="rolesTable">
    <thead>
        <tr>
            <th>Role Name</th>
            <th>Description</th>
            <th>Users Count</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="rolesBody">
    </tbody>
</table>


         <h3>  Add Role</h3>
    <form id="roleForm">
    <input type="text" id="roleName" placeholder="Role Name" required>
    <input type="text" id="roleDesc" placeholder="Description" required>
    <button type="submit">   Add Role</button>
</form>
            <h3>  Permissions</h3>

            <div class="permissions">
                <div>
                    <strong>   Users</strong><br>
                    <input type="checkbox">   Create
                    <input type="checkbox">   Edit
                    <input type="checkbox">   Delete
                    <input type="checkbox">   View
                </div>

                <div>
                    <strong>   Orders</strong><br>
                    <input type="checkbox">   Create
                    <input type="checkbox">   Edit
                    <input type="checkbox">   Delete
                    <input type="checkbox">   View
                </div>

                <div>
                    <strong>   Reports</strong><br>
                    <input type="checkbox">   Create
                    <input type="checkbox">   Edit
                    <input type="checkbox">   Delete
                    <input type="checkbox">   View
                </div>
            </div>
    </div>
</div>    
<script src="js/dashboard.js"></script>
<script src="js/roles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
