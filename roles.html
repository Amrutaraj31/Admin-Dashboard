<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Roles & Permissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
       
       <link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="sidebar-container"></div>

<div class="layout">


     <div class="main">
        <header>
<button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebar">☰</button>    
    <h2>Roles & Permissions</h2>
     <div class="header-icons">
          
    </div>
</header>
       <div class="card">

<div class="card-header">
Roles List
</div>

<div class="card-body">

<table class="table table-hover table-striped">

<thead>
<tr>
<th>Role Name</th>
<th>Description</th>
<th>Users</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="rolesBody"></tbody>

</table>

</div>

</div>


         <h3>Add Role</h3>
    <form id="roleForm">
    <input type="text" id="roleName" placeholder="Role Name" required>
    <input type="text" id="roleDesc" placeholder="Description" required>
    <button type="submit">Add Role</button>
</form>
            <h3>Permissions</h3>

            <div class="permissions">
                <div>
                    <strong>Users</strong><br>
                    <input type="checkbox"> Create
                    <input type="checkbox"> Edit
                    <input type="checkbox"> Delete
                    <input type="checkbox"> View
                </div>

                <div>
                    <strong>Orders</strong><br>
                    <input type="checkbox"> Create
                    <input type="checkbox"> Edit
                    <input type="checkbox"> Delete
                    <input type="checkbox"> View
                </div>

                <div>
                    <strong>Reports</strong><br>
                    <input type="checkbox"> Create
                    <input type="checkbox"> Edit
                    <input type="checkbox"> Delete
                    <input type="checkbox"> View
                </div>
            </div>
    </div>
</div>    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/loadSidebar.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/roles.js"></script>
</body>
</html>
